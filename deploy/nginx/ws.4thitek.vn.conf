# ==============================================================================
# Nginx Configuration for ws.4thitek.vn
# Reverse proxies WebSocket/SockJS traffic to the backend /ws endpoint.
# Requires the shared `notification_ws` upstream and `$connection_upgrade` map.
# ==============================================================================

# ==============================================================================
# HTTP to HTTPS Redirect
# ==============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name ws.4thitek.vn;

    access_log /var/log/nginx/ws.4thitek.vn-http-access.log;
    error_log /var/log/nginx/ws.4thitek.vn-http-error.log;

    return 301 https://$host$request_uri;
}

# ==============================================================================
# HTTPS - WebSocket Gateway
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ws.4thitek.vn;

    # ==================== SSL ====================
    ssl_certificate /etc/ssl/ws.4thitek.vn/fullchain.crt;
    ssl_certificate_key /etc/ssl/ws.4thitek.vn/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:WsSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==================== Security Headers ====================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ==================== Logs ====================
    access_log /var/log/nginx/ws.4thitek.vn-access.log;
    error_log /var/log/nginx/ws.4thitek.vn-error.log warn;

    # ==================== WebSocket Endpoint ====================
    location /ws {
        proxy_pass http://notification_ws;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        proxy_buffering off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location / {
        return 404;
    }
}
