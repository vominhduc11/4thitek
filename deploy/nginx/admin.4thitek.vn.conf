# ==============================================================================
# Nginx Configuration for admin.4thitek.vn
# Reverse proxies to the admin frontend container exposed on the host.
# Requires the shared `admin_frontend` upstream to be defined in the Nginx http context.
# ==============================================================================

# ==============================================================================
# HTTP to HTTPS Redirect
# ==============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name admin.4thitek.vn;

    access_log /var/log/nginx/admin.4thitek.vn-http-access.log;
    error_log /var/log/nginx/admin.4thitek.vn-http-error.log;

    return 301 https://$host$request_uri;
}

# ==============================================================================
# HTTPS - Admin Frontend
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.4thitek.vn;

    # ==================== SSL ====================
    ssl_certificate /etc/ssl/admin.4thitek.vn/fullchain.crt;
    ssl_certificate_key /etc/ssl/admin.4thitek.vn/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:AdminSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==================== Security Headers ====================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==================== Logs ====================
    access_log /var/log/nginx/admin.4thitek.vn-access.log;
    error_log /var/log/nginx/admin.4thitek.vn-error.log warn;

    # ==================== Client Settings ====================
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ==================== Main Admin App Proxy ====================
    location / {
        limit_req zone=general_limit burst=60 nodelay;

        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ==================== Health Check ====================
    location /healthz {
        proxy_pass http://admin_frontend/healthz;
        proxy_set_header Host $host;
        access_log off;
    }
}
