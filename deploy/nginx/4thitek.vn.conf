# ==============================================================================
# Nginx Configuration for 4thitek.vn
# Reverse proxies to the main frontend container exposed on the host.
# Requires the shared `main_frontend` upstream to be defined in the Nginx http context.
# ==============================================================================

# ==============================================================================
# HTTP to HTTPS Redirect
# ==============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name 4thitek.vn www.4thitek.vn;

    access_log /var/log/nginx/4thitek.vn-http-access.log;
    error_log /var/log/nginx/4thitek.vn-http-error.log;

    return 301 https://4thitek.vn$request_uri;
}

# ==============================================================================
# HTTPS - Canonical Redirect for www
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.4thitek.vn;

    ssl_certificate /etc/ssl/4thitek.vn/fullchain.crt;
    ssl_certificate_key /etc/ssl/4thitek.vn/private.key;

    return 301 https://4thitek.vn$request_uri;
}

# ==============================================================================
# HTTPS - Main Frontend
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 4thitek.vn;

    # ==================== SSL ====================
    ssl_certificate /etc/ssl/4thitek.vn/fullchain.crt;
    ssl_certificate_key /etc/ssl/4thitek.vn/private.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MainSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==================== Security Headers ====================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:; connect-src 'self' https: wss:;" always;

    # ==================== Logs ====================
    access_log /var/log/nginx/4thitek.vn-access.log;
    error_log /var/log/nginx/4thitek.vn-error.log warn;

    # ==================== Client Settings ====================
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ==================== Main Site Proxy ====================
    location / {
        limit_req zone=general_limit burst=100 nodelay;

        proxy_pass http://main_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}
