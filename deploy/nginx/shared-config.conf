# Shared Nginx configuration for 4thitek.vn production infrastructure.
# Deploy to: /etc/nginx/conf.d/shared-config.conf

# ==================== Rate Limits ====================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# ==================== WebSocket Upgrade Mapping ====================
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ==================== Upstreams ====================
upstream api_backend {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream main_frontend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream admin_frontend {
    server 127.0.0.1:4173 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream notification_ws {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Optional if you later deploy the dealer web frontend.
# upstream dealer_frontend {
#     server 127.0.0.1:4174 max_fails=3 fail_timeout=30s;
#     keepalive 16;
