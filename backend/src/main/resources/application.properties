spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
management.health.mail.enabled=${APP_MAIL_ENABLED:false}

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fourthitek;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:1800000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.allowed-extensions=${UPLOAD_ALLOWED_EXTENSIONS:jpg,jpeg,png,gif,webp,pdf}
app.upload.base-url=${UPLOAD_BASE_URL:/uploads}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}

sepay.enabled=${SEPAY_ENABLED:false}
sepay.webhook-token=${SEPAY_WEBHOOK_TOKEN:}
sepay.bank-name=${SEPAY_BANK_NAME:}
sepay.account-number=${SEPAY_ACCOUNT_NUMBER:}
sepay.account-holder=${SEPAY_ACCOUNT_HOLDER:}

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
app.mail.from-name=${APP_MAIL_FROM_NAME:4ThiTek}
app.password-reset.base-url=${APP_PASSWORD_RESET_BASE_URL:}
app.password-reset.expiration-minutes=${APP_PASSWORD_RESET_EXPIRATION_MINUTES:30}
