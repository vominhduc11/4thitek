spring.application.name=backend
spring.jackson.serialization.write-dates-as-timestamps=false
spring.config.import=optional:file:.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
management.health.mail.enabled=${APP_MAIL_ENABLED:false}

server.port=${SERVER_PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
server.tomcat.uri-encoding=UTF-8

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fourthitek;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:1}
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.database=${SPRING_DATA_REDIS_DATABASE:0}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:1800000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.allowed-extensions=${UPLOAD_ALLOWED_EXTENSIONS:jpg,jpeg,png,gif,webp,pdf}
app.upload.base-url=${UPLOAD_BASE_URL:/uploads}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.storage.provider=${APP_STORAGE_PROVIDER:local}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:ap-southeast-1}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:}
app.storage.s3.path-style-access=${APP_STORAGE_S3_PATH_STYLE_ACCESS:true}
app.storage.s3.public-base-url=${APP_STORAGE_S3_PUBLIC_BASE_URL:}
app.security.require-strong-jwt-secret=${APP_SECURITY_REQUIRE_STRONG_JWT_SECRET:true}
app.cache.public.ttl-minutes=${APP_CACHE_PUBLIC_TTL_MINUTES:30}
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.rate-limit.auth.requests=${APP_RATE_LIMIT_AUTH_REQUESTS:10}
app.rate-limit.auth.window-seconds=${APP_RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
app.rate-limit.password-reset.requests=${APP_RATE_LIMIT_PASSWORD_RESET_REQUESTS:5}
app.rate-limit.password-reset.window-seconds=${APP_RATE_LIMIT_PASSWORD_RESET_WINDOW_SECONDS:300}
app.rate-limit.warranty-lookup.requests=${APP_RATE_LIMIT_WARRANTY_LOOKUP_REQUESTS:30}
app.rate-limit.warranty-lookup.window-seconds=${APP_RATE_LIMIT_WARRANTY_LOOKUP_WINDOW_SECONDS:60}
app.rate-limit.upload.requests=${APP_RATE_LIMIT_UPLOAD_REQUESTS:20}
app.rate-limit.upload.window-seconds=${APP_RATE_LIMIT_UPLOAD_WINDOW_SECONDS:60}
app.rate-limit.webhook.requests=${APP_RATE_LIMIT_WEBHOOK_REQUESTS:120}
app.rate-limit.webhook.window-seconds=${APP_RATE_LIMIT_WEBHOOK_WINDOW_SECONDS:60}

sepay.enabled=${SEPAY_ENABLED:false}
sepay.webhook-token=${SEPAY_WEBHOOK_TOKEN:}
sepay.bank-name=${SEPAY_BANK_NAME:VPBank}
sepay.account-number=${SEPAY_ACCOUNT_NUMBER:0896664086}
sepay.account-holder=${SEPAY_ACCOUNT_HOLDER:VO MINH DUC}

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
app.mail.from-name=${APP_MAIL_FROM_NAME:4ThiTek}
app.password-reset.base-url=${APP_PASSWORD_RESET_BASE_URL:}
app.password-reset.expiration-minutes=${APP_PASSWORD_RESET_EXPIRATION_MINUTES:30}

spring.task.execution.thread-name-prefix=app-async-
spring.task.execution.pool.core-size=${SPRING_TASK_EXECUTION_POOL_CORE_SIZE:4}
spring.task.execution.pool.max-size=${SPRING_TASK_EXECUTION_POOL_MAX_SIZE:8}
spring.task.execution.pool.queue-capacity=${SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY:200}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.messages.encoding=UTF-8
logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.pattern.level=%5p [%X{requestId:-},%X{actor:-}]
