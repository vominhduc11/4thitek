spring.application.name=backend
spring.jackson.serialization.write-dates-as-timestamps=false
spring.config.import=optional:file:.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
management.health.mail.enabled=${APP_MAIL_ENABLED:false}

server.port=${SERVER_PORT:8080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
server.tomcat.uri-encoding=UTF-8

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fourthitek;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:1}
spring.flyway.validate-on-migrate=${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.database=${SPRING_DATA_REDIS_DATABASE:0}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:1800000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.allowed-extensions=${UPLOAD_ALLOWED_EXTENSIONS:jpg,jpeg,png,gif,webp,pdf}
app.upload.base-url=${UPLOAD_BASE_URL:/uploads}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
app.docs.public-enabled=${APP_DOCS_PUBLIC_ENABLED:false}
# Local is the dev fallback. Production compose overrides this to s3/minio so support media uses presigned uploads.
app.storage.provider=${APP_STORAGE_PROVIDER:local}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.presign-endpoint=${APP_STORAGE_S3_PRESIGN_ENDPOINT:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:ap-southeast-1}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:}
app.storage.s3.path-style-access=${APP_STORAGE_S3_PATH_STYLE_ACCESS:true}
app.storage.s3.public-base-url=${APP_STORAGE_S3_PUBLIC_BASE_URL:}
app.media.image-extensions=${APP_MEDIA_IMAGE_EXTENSIONS:jpg,jpeg,png,webp}
app.media.video-extensions=${APP_MEDIA_VIDEO_EXTENSIONS:mp4,webm}
app.media.document-extensions=${APP_MEDIA_DOCUMENT_EXTENSIONS:pdf}
app.media.max-image-bytes=${APP_MEDIA_MAX_IMAGE_BYTES:10485760}
app.media.max-document-bytes=${APP_MEDIA_MAX_DOCUMENT_BYTES:10485760}
app.media.max-video-bytes=${APP_MEDIA_MAX_VIDEO_BYTES:52428800}
app.media.max-attachments-per-message=${APP_MEDIA_MAX_ATTACHMENTS_PER_MESSAGE:6}
app.media.max-videos-per-message=${APP_MEDIA_MAX_VIDEOS_PER_MESSAGE:2}
app.media.upload-session-ttl=${APP_MEDIA_UPLOAD_SESSION_TTL:PT15M}
app.media.presigned-upload-ttl=${APP_MEDIA_PRESIGNED_UPLOAD_TTL:PT15M}
app.media.signed-access-ttl=${APP_MEDIA_SIGNED_ACCESS_TTL:PT10M}
app.media.cleanup-enabled=${APP_MEDIA_CLEANUP_ENABLED:true}
app.media.pending-max-age=${APP_MEDIA_PENDING_MAX_AGE:PT24H}
app.media.deleted-retention=${APP_MEDIA_DELETED_RETENTION:P30D}
app.media.cleanup-interval=${APP_MEDIA_CLEANUP_INTERVAL:PT1H}
app.media.signed-url-secret=${APP_MEDIA_SIGNED_URL_SECRET:}
app.security.require-strong-jwt-secret=${APP_SECURITY_REQUIRE_STRONG_JWT_SECRET:true}
app.cache.public.ttl-minutes=${APP_CACHE_PUBLIC_TTL_MINUTES:30}
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.rate-limit.auth-requests=${APP_RATE_LIMIT_AUTH_REQUESTS:10}
app.rate-limit.auth-window-seconds=${APP_RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
app.rate-limit.password-reset-requests=${APP_RATE_LIMIT_PASSWORD_RESET_REQUESTS:5}
app.rate-limit.password-reset-window-seconds=${APP_RATE_LIMIT_PASSWORD_RESET_WINDOW_SECONDS:300}
app.rate-limit.warranty-lookup-requests=${APP_RATE_LIMIT_WARRANTY_LOOKUP_REQUESTS:30}
app.rate-limit.warranty-lookup-window-seconds=${APP_RATE_LIMIT_WARRANTY_LOOKUP_WINDOW_SECONDS:60}
app.rate-limit.upload-requests=${APP_RATE_LIMIT_UPLOAD_REQUESTS:20}
app.rate-limit.upload-window-seconds=${APP_RATE_LIMIT_UPLOAD_WINDOW_SECONDS:60}
app.rate-limit.webhook-requests=${APP_RATE_LIMIT_WEBHOOK_REQUESTS:120}
app.rate-limit.webhook-window-seconds=${APP_RATE_LIMIT_WEBHOOK_WINDOW_SECONDS:60}
app.rate-limit.trust-forwarded-for=${APP_RATE_LIMIT_TRUST_FORWARDED_FOR:false}
app.fcm.enabled=${APP_FCM_ENABLED:false}
app.fcm.project-id=${APP_FCM_PROJECT_ID:}
app.fcm.credentials-path=${APP_FCM_CREDENTIALS_PATH:}
app.fcm.credentials-json-base64=${APP_FCM_CREDENTIALS_JSON_BASE64:}
app.auth.refresh-cookie.name=${APP_AUTH_REFRESH_COOKIE_NAME:fourthitek_refresh}
app.auth.refresh-cookie.path=${APP_AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
app.auth.refresh-cookie.domain=${APP_AUTH_REFRESH_COOKIE_DOMAIN:}
app.auth.refresh-cookie.secure=${APP_AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.same-site=${APP_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
app.audit.trust-forwarded-for=${APP_AUDIT_TRUST_FORWARDED_FOR:false}

sepay.enabled=${SEPAY_ENABLED:false}
sepay.webhook-token=${SEPAY_WEBHOOK_TOKEN:}
sepay.bank-name=${SEPAY_BANK_NAME:}
sepay.account-number=${SEPAY_ACCOUNT_NUMBER:}
sepay.account-holder=${SEPAY_ACCOUNT_HOLDER:}

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:info@4thitek.vn}
app.mail.from-name=${APP_MAIL_FROM_NAME:4T HITEK}
app.password-reset.base-url=${APP_PASSWORD_RESET_BASE_URL:}
app.admin-password-reset.base-url=${APP_ADMIN_PASSWORD_RESET_BASE_URL:}
app.password-reset.expiration-minutes=${APP_PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.email-verification.base-url=${APP_EMAIL_VERIFICATION_BASE_URL:}
app.email-verification.expiration-minutes=${APP_EMAIL_VERIFICATION_EXPIRATION_MINUTES:60}
app.inventory.alert-scan-interval-ms=${APP_INVENTORY_ALERT_SCAN_INTERVAL_MS:3600000}
app.inventory.alert-cooldown-hours=${APP_INVENTORY_ALERT_COOLDOWN_HOURS:24}

app.order.idempotency-ttl-minutes=${APP_ORDER_IDEMPOTENCY_TTL_MINUTES:10}
app.order.pending-timeout-hours=${APP_ORDER_PENDING_TIMEOUT_HOURS:48}
app.order.stale-check-interval-ms=${APP_ORDER_STALE_CHECK_INTERVAL_MS:3600000}
app.order.stale-warning-before-hours=${APP_ORDER_STALE_WARNING_BEFORE_HOURS:6}
app.order.confirmed-shipping-alert-hours=${APP_ORDER_CONFIRMED_SHIPPING_ALERT_HOURS:48}
app.payment.large-amount-proof-threshold=${APP_PAYMENT_LARGE_AMOUNT_PROOF_THRESHOLD:10000000}
app.payment.reconciliation-cron=${APP_PAYMENT_RECONCILIATION_CRON:0 0 0 * * *}
app.payment.reconciliation-zone=${APP_PAYMENT_RECONCILIATION_ZONE:Asia/Ho_Chi_Minh}

spring.task.execution.thread-name-prefix=app-async-
spring.task.execution.pool.core-size=${SPRING_TASK_EXECUTION_POOL_CORE_SIZE:4}
spring.task.execution.pool.max-size=${SPRING_TASK_EXECUTION_POOL_MAX_SIZE:8}
spring.task.execution.pool.queue-capacity=${SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY:200}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${APP_DOCS_PUBLIC_ENABLED:false}
springdoc.swagger-ui.enabled=${APP_DOCS_PUBLIC_ENABLED:false}

spring.messages.encoding=UTF-8
logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.pattern.level=%5p [%X{requestId:-},%X{actor:-}]
