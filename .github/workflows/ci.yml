name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  # ── Secret scanning ────────────────────────────────────────────────────────
  # Runs first, in parallel with the other jobs.
  # Scans the entire working tree for accidentally committed credentials.
  # Blocking: a PR with a detected secret cannot merge.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/
      - name: Detect secrets
        # --no-git  : scan the working tree (committed files), not git history
        # --redact  : replace matched secret values in output with REDACTED
        # --no-banner: cleaner CI output
        run: gitleaks detect --source . --no-git --config .gitleaks.toml --redact --no-banner

  # ── Backend ────────────────────────────────────────────────────────────────
  # ./mvnw verify (not just test) so JaCoCo coverage check runs.
  # Build fails if instruction coverage of business-logic classes drops below 60%.
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Test + coverage check
        run: ./mvnw -B verify

  # ── Main website ───────────────────────────────────────────────────────────
  main-fe:
    name: Main Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-fe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: main-fe/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        # --omit=dev : only check packages that ship to users, not build tools
        # --audit-level=high : fail on HIGH or CRITICAL CVEs in prod deps
        run: npm audit --audit-level=high --omit=dev
      - name: Run tests
        run: npm run test -- --run
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.4thitek.vn/api/v1
          INTERNAL_API_BASE_URL: https://api.4thitek.vn/api/v1
        run: npm run build

  # ── Admin dashboard ────────────────────────────────────────────────────────
  admin-fe:
    name: Admin Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-fe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-fe/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
      - name: Run tests
        run: npm run test -- --run
      - name: Build
        env:
          VITE_API_BASE_URL: https://api.4thitek.vn/api/v1
        run: npm run build

  # ── Dealer app ─────────────────────────────────────────────────────────────
  dealer:
    name: Dealer App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dealer
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
