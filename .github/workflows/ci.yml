name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run backend tests
        run: ./mvnw -B test

  main-fe:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-fe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: main-fe/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test -- --run
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.4thitek.vn/api/v1
          INTERNAL_API_BASE_URL: https://api.4thitek.vn/api/v1
        run: npm run build

  admin-fe:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-fe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-fe/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test -- --run
      - name: Build
        env:
          VITE_API_BASE_URL: https://api.4thitek.vn/api/v1
        run: npm run build

  dealer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dealer
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
