name: Security Scan

# Runs weekly on Monday mornings — does NOT block the developer flow.
# Job failures here send a GitHub notification to repository watchers so
# the team can review the artifact report and decide on suppressions or upgrades.
#
# workflow_dispatch lets you trigger a manual scan before a release.
on:
  schedule:
    - cron: '0 3 * * 1'  # Mondays 03:00 UTC
  workflow_dispatch:

jobs:
  # ── OWASP Dependency Check — backend ──────────────────────────────────────
  # Scans all JARs in the Maven dependency tree against the NVD CVE database.
  # Fails if any dependency has a CVSS score >= 7.0 (HIGH or CRITICAL).
  # Test-scope dependencies are excluded (they never reach production).
  #
  # To suppress a known false-positive or an accepted risk, add an entry to
  # backend/dependency-check-suppressions.xml and commit it with a comment
  # explaining why the finding was accepted.
  owasp-backend:
    name: OWASP Dependency Check (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          # Refresh the NVD cache weekly (aligns with this job's schedule)
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: owasp-nvd-
      - name: Run OWASP Dependency Check
        # -P security-scan activates the plugin defined in pom.xml's <profiles>.
        # dependency-check:check runs only that goal, not the full Maven lifecycle,
        # so JaCoCo thresholds and spring-boot repackage are not triggered here.
        run: ./mvnw -B -P security-scan dependency-check:check
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-${{ github.run_number }}
          path: backend/target/dependency-check-report.html
          retention-days: 90

  # ── npm audit — frontend (deep scan, includes devDependencies) ─────────────
  # The blocking CI gate uses --omit=dev and --audit-level=high.
  # This weekly job scans ALL dependencies (including dev/build tools) at
  # --audit-level=moderate to surface issues that don't block PRs yet.
  npm-audit-deep:
    name: npm audit deep (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [main-fe, admin-fe]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - name: npm audit (all deps, moderate+)
        # continue-on-error so both matrix apps are always reported, and
        # so a moderate finding in dev tooling doesn't drown out a critical one
        run: npm audit --audit-level=moderate
        continue-on-error: true
