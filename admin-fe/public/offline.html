<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — 4T HITEK Admin</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 380px;
        width: 100%;
      }
      .icon {
        font-size: 48px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 10px;
      }
      p {
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      button {
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 12px 28px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #2563eb; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>Không có kết nối mạng</h1>
      <p>Vui lòng kiểm tra kết nối internet và thử lại.<br />Dữ liệu đã được lưu cache sẽ tiếp tục hoạt động bình thường.</p>
      <button onclick="window.location.reload()">Thử lại</button>
    </div>
  </body>
</html>
