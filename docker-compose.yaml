# docker-compose.yaml — single compose file for local, staging, and production
#
# USAGE:
#   cp .env.example .env          # for local / staging
#   cp .env.production.example .env  # for production — fill in every CHANGE_ME_*
#   docker compose up -d
#
# SECRETS: No fallback defaults for the five required credentials below.
#          Missing variables cause an immediate error before any container starts.
#
# NOTE: This file does not include TLS termination or a reverse proxy.
#       For internet-facing deployments, put Nginx / Caddy in front.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (cp .env.example .env)}
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # $${REDIS_PASSWORD} — double-$ escapes Compose interpolation; the shell
    # inside the container sees ${REDIS_PASSWORD} which is always set because
    # the environment block below forces it to be present at parse time.
    command: >
      sh -c "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env (cp .env.example .env)}
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env (cp .env.example .env)}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env (cp .env.example .env)}
    ports:
      # Keep the S3 API on loopback for the documented same-host proxy/deploy model.
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing local/${MINIO_BUCKET:-4thitek-uploads} &&
        echo '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"AWS":["*"]},"Action":["s3:GetObject"],"Resource":["arn:aws:s3:::${MINIO_BUCKET:-4thitek-uploads}/products/*","arn:aws:s3:::${MINIO_BUCKET:-4thitek-uploads}/blogs/*"]}]}' > /tmp/public-policy.json &&
        mc anonymous set-json /tmp/public-policy.json local/${MINIO_BUCKET:-4thitek-uploads}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-app_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-2}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:-600000}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-30000}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:-1800000}
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_DATABASE: ${SPRING_DATA_REDIS_DATABASE:-0}
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env - generate with openssl rand -hex 32}"
      APP_SEED_DEMO_DATA: ${APP_SEED_DEMO_DATA:-false}
      # Bootstrap defaults to disabled — set APP_BOOTSTRAP_SUPER_ADMIN_ENABLED=true
      # in .env only on first deploy, then revert to false.
      APP_BOOTSTRAP_SUPER_ADMIN_ENABLED: ${APP_BOOTSTRAP_SUPER_ADMIN_ENABLED:-false}
      APP_BOOTSTRAP_SUPER_ADMIN_EMAIL: ${APP_BOOTSTRAP_SUPER_ADMIN_EMAIL:-}
      APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD: ${APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD:-}
      APP_BOOTSTRAP_SUPER_ADMIN_NAME: ${APP_BOOTSTRAP_SUPER_ADMIN_NAME:-System Owner}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-}
      APP_CORS_ALLOW_CREDENTIALS: ${APP_CORS_ALLOW_CREDENTIALS:-true}
      UPLOAD_DIR: /app/uploads
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-/uploads}
      APP_STORAGE_PROVIDER: ${APP_STORAGE_PROVIDER:-s3}
      APP_STORAGE_S3_BUCKET: ${MINIO_BUCKET:-4thitek-uploads}
      APP_STORAGE_S3_ENDPOINT: ${APP_STORAGE_S3_ENDPOINT:-http://minio:9000}
      APP_STORAGE_S3_REGION: ${APP_STORAGE_S3_REGION:-ap-southeast-1}
      APP_STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      APP_STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      APP_STORAGE_S3_PATH_STYLE_ACCESS: ${APP_STORAGE_S3_PATH_STYLE_ACCESS:-true}
      APP_STORAGE_S3_PUBLIC_BASE_URL: ${APP_STORAGE_S3_PUBLIC_BASE_URL:-http://localhost:${MINIO_API_PORT:-9000}/${MINIO_BUCKET:-4thitek-uploads}}
      APP_SECURITY_REQUIRE_STRONG_JWT_SECRET: ${APP_SECURITY_REQUIRE_STRONG_JWT_SECRET:-true}
      APP_CACHE_PUBLIC_TTL_MINUTES: ${APP_CACHE_PUBLIC_TTL_MINUTES:-30}
      APP_ORDER_IDEMPOTENCY_TTL_MINUTES: ${APP_ORDER_IDEMPOTENCY_TTL_MINUTES:-10}
      APP_ORDER_PENDING_TIMEOUT_HOURS: ${APP_ORDER_PENDING_TIMEOUT_HOURS:-48}
      APP_ORDER_STALE_CHECK_INTERVAL_MS: ${APP_ORDER_STALE_CHECK_INTERVAL_MS:-3600000}
      APP_ORDER_STALE_WARNING_BEFORE_HOURS: ${APP_ORDER_STALE_WARNING_BEFORE_HOURS:-6}
      APP_PAYMENT_LARGE_AMOUNT_PROOF_THRESHOLD: ${APP_PAYMENT_LARGE_AMOUNT_PROOF_THRESHOLD:-10000000}
      APP_RATE_LIMIT_ENABLED: ${APP_RATE_LIMIT_ENABLED:-true}
      APP_RATE_LIMIT_AUTH_REQUESTS: ${APP_RATE_LIMIT_AUTH_REQUESTS:-10}
      APP_RATE_LIMIT_AUTH_WINDOW_SECONDS: ${APP_RATE_LIMIT_AUTH_WINDOW_SECONDS:-60}
      APP_RATE_LIMIT_PASSWORD_RESET_REQUESTS: ${APP_RATE_LIMIT_PASSWORD_RESET_REQUESTS:-5}
      APP_RATE_LIMIT_PASSWORD_RESET_WINDOW_SECONDS: ${APP_RATE_LIMIT_PASSWORD_RESET_WINDOW_SECONDS:-300}
      APP_RATE_LIMIT_WARRANTY_LOOKUP_REQUESTS: ${APP_RATE_LIMIT_WARRANTY_LOOKUP_REQUESTS:-30}
      APP_RATE_LIMIT_WARRANTY_LOOKUP_WINDOW_SECONDS: ${APP_RATE_LIMIT_WARRANTY_LOOKUP_WINDOW_SECONDS:-60}
      APP_RATE_LIMIT_UPLOAD_REQUESTS: ${APP_RATE_LIMIT_UPLOAD_REQUESTS:-20}
      APP_RATE_LIMIT_UPLOAD_WINDOW_SECONDS: ${APP_RATE_LIMIT_UPLOAD_WINDOW_SECONDS:-60}
      APP_RATE_LIMIT_WEBHOOK_REQUESTS: ${APP_RATE_LIMIT_WEBHOOK_REQUESTS:-120}
      APP_RATE_LIMIT_WEBHOOK_WINDOW_SECONDS: ${APP_RATE_LIMIT_WEBHOOK_WINDOW_SECONDS:-60}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      APP_MAIL_FROM_NAME: ${APP_MAIL_FROM_NAME:-4ThiTek}
      APP_PASSWORD_RESET_BASE_URL: ${APP_PASSWORD_RESET_BASE_URL:-}
      APP_PASSWORD_RESET_EXPIRATION_MINUTES: ${APP_PASSWORD_RESET_EXPIRATION_MINUTES:-30}
      APP_EMAIL_VERIFICATION_BASE_URL: ${APP_EMAIL_VERIFICATION_BASE_URL:-}
      APP_EMAIL_VERIFICATION_EXPIRATION_MINUTES: ${APP_EMAIL_VERIFICATION_EXPIRATION_MINUTES:-60}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-true}
      SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION:-1}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:-true}
      SEPAY_ENABLED: ${SEPAY_ENABLED:-false}
      SEPAY_WEBHOOK_TOKEN: ${SEPAY_WEBHOOK_TOKEN:-}
      SEPAY_BANK_NAME: ${SEPAY_BANK_NAME:-}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_ACCOUNT_HOLDER: ${SEPAY_ACCOUNT_HOLDER:-}
      APP_DOCS_PUBLIC_ENABLED: ${APP_DOCS_PUBLIC_ENABLED:-false}
      APP_AUTH_REFRESH_COOKIE_NAME: ${APP_AUTH_REFRESH_COOKIE_NAME:-fourthitek_refresh}
      APP_AUTH_REFRESH_COOKIE_PATH: ${APP_AUTH_REFRESH_COOKIE_PATH:-/api/v1/auth}
      APP_AUTH_REFRESH_COOKIE_DOMAIN: ${APP_AUTH_REFRESH_COOKIE_DOMAIN:-}
      APP_AUTH_REFRESH_COOKIE_SECURE: ${APP_AUTH_REFRESH_COOKIE_SECURE:-true}
      APP_AUTH_REFRESH_COOKIE_SAME_SITE: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
      # Set to true when running behind a reverse proxy that sets X-Forwarded-For
      APP_AUDIT_TRUST_FORWARDED_FOR: ${APP_AUDIT_TRUST_FORWARDED_FOR:-false}
      APP_RATE_LIMIT_TRUST_FORWARDED_FOR: ${APP_RATE_LIMIT_TRUST_FORWARDED_FOR:-false}
      APP_FCM_ENABLED: ${APP_FCM_ENABLED:-false}
      APP_FCM_PROJECT_ID: ${APP_FCM_PROJECT_ID:-}
      APP_FCM_CREDENTIALS_JSON_BASE64: ${APP_FCM_CREDENTIALS_JSON_BASE64:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    volumes:
      - upload-data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  main-fe:
    build:
      context: ./main-fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-http://localhost:${BACKEND_PORT:-8080}}
        NEXT_PUBLIC_API_VERSION: ${NEXT_PUBLIC_API_VERSION:-v1}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8080}/api/v1}
        INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://backend:8080}
        INTERNAL_API_VERSION: ${INTERNAL_API_VERSION:-v1}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8080/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MAIN_FE_PORT:-3000}:3000"

  admin-fe:
    build:
      context: ./admin-fe
      dockerfile: Dockerfile
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-http://localhost:${BACKEND_PORT:-8080}}
        VITE_API_VERSION: ${VITE_API_VERSION:-v1}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8080}/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_ORIGIN: ${API_ORIGIN:-http://localhost:${BACKEND_PORT:-8080}}
      API_VERSION: ${API_VERSION:-v1}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:${BACKEND_PORT:-8080}/api/v1}
    ports:
      - "127.0.0.1:${ADMIN_FE_PORT:-4173}:80"

  # dealer:
  #   build:
  #     context: ./dealer
  #     dockerfile: Dockerfile
  #     args:
  #       API_ORIGIN: ${DEALER_API_ORIGIN:-http://localhost:${BACKEND_PORT:-8080}}
  #       API_VERSION: ${DEALER_API_VERSION:-v1}
  #       API_BASE_URL: ${DEALER_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8080}/api/v1}
  #       WS_BASE_URL: ${DEALER_WS_BASE_URL:-ws://localhost:${BACKEND_PORT:-8080}}
  #       PUBLIC_SITE_BASE_URL: ${PUBLIC_SITE_BASE_URL:-http://localhost:${MAIN_FE_PORT:-3000}}
