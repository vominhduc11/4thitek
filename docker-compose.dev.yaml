services:
  postgres:
    image: postgres:16
    container_name: 4thitek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: 4thitek-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD:-redis_password}\""
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_PASSWORD:-redis_password}\" ping | grep PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: 4thitek-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: 4thitek-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin123}" &&
        mc mb --ignore-existing local/${MINIO_BUCKET:-4thitek-uploads} &&
        mc anonymous set download local/${MINIO_BUCKET:-4thitek-uploads}

  backend:
    image: maven:3.9.8-eclipse-temurin-17
    container_name: 4thitek-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/app_db
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      SPRING_DATA_REDIS_DATABASE: 0
      SPRING_FLYWAY_ENABLED: true
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: 0123456789abcdef0123456789abcdef
      UPLOAD_DIR: /app/uploads
      UPLOAD_BASE_URL: /uploads
      APP_STORAGE_PROVIDER: ${APP_STORAGE_PROVIDER:-s3}
      APP_STORAGE_S3_BUCKET: ${MINIO_BUCKET:-4thitek-uploads}
      APP_STORAGE_S3_ENDPOINT: http://minio:9000
      APP_STORAGE_S3_REGION: ${APP_STORAGE_S3_REGION:-ap-southeast-1}
      APP_STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APP_STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      APP_STORAGE_S3_PATH_STYLE_ACCESS: true
      APP_STORAGE_S3_PUBLIC_BASE_URL: ${APP_STORAGE_S3_PUBLIC_BASE_URL:-http://localhost:9000/${MINIO_BUCKET:-4thitek-uploads}}
      APP_CACHE_PUBLIC_TTL_MINUTES: ${APP_CACHE_PUBLIC_TTL_MINUTES:-30}
      APP_RATE_LIMIT_ENABLED: ${APP_RATE_LIMIT_ENABLED:-true}
      APP_BOOTSTRAP_SUPER_ADMIN_ENABLED: ${APP_BOOTSTRAP_SUPER_ADMIN_ENABLED:-true}
      APP_BOOTSTRAP_SUPER_ADMIN_EMAIL: ${APP_BOOTSTRAP_SUPER_ADMIN_EMAIL:-}
      APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD: ${APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD:-}
      APP_BOOTSTRAP_SUPER_ADMIN_NAME: ${APP_BOOTSTRAP_SUPER_ADMIN_NAME:-System Owner}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
      APP_PASSWORD_RESET_BASE_URL: http://localhost:3000/reset-password
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - upload-data:/app/uploads
      - m2:/root/.m2
    command: mvn -DskipTests spring-boot:run

  admin-fe:
    image: node:20
    container_name: 4thitek-admin-fe
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
      API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./admin-fe:/app
      - admin_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  dealer:
    image: ghcr.io/cirruslabs/flutter:stable
    container_name: 4thitek-dealer
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5174:5174"
    volumes:
      - ./dealer:/app
    command: sh -c "flutter config --enable-web && flutter pub get && flutter run -d web-server --web-hostname 0.0.0.0 --web-port 5174 --dart-define=API_BASE_URL=http://localhost:8080"

  main-fe:
    image: node:20
    container_name: 4thitek-main-fe
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
      INTERNAL_API_BASE_URL: http://backend:8080
    ports:
      - "3000:3000"
    volumes:
      - ./main-fe:/app
      - main_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"

volumes:
  pgdata:
  redis-data:
  minio-data:
  upload-data:
  m2:
  admin_node_modules:
  main_node_modules:
