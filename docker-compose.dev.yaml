services:
  postgres:
    image: postgres:16
    container_name: 4thitek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9.8-eclipse-temurin-17
    container_name: 4thitek-backend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/app_db
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      JWT_SECRET: 0123456789abcdef0123456789abcdef
      UPLOAD_DIR: /app/uploads
      UPLOAD_BASE_URL: /uploads
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
      APP_PASSWORD_RESET_BASE_URL: http://localhost:3000/reset-password
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - upload-data:/app/uploads
      - m2:/root/.m2
    command: mvn -DskipTests spring-boot:run

  admin-fe:
    image: node:20
    container_name: 4thitek-admin-fe
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    volumes:
      - ./admin-fe:/app
      - admin_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  dealer:
    image: ghcr.io/cirruslabs/flutter:stable
    container_name: 4thitek-dealer
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5174:5174"
    volumes:
      - ./dealer:/app
    command: sh -c "flutter config --enable-web && flutter pub get && flutter run -d web-server --web-hostname 0.0.0.0 --web-port 5174 --dart-define=API_BASE_URL=http://localhost:8080"

  main-fe:
    image: node:20
    container_name: 4thitek-main-fe
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
      INTERNAL_API_BASE_URL: http://backend:8080/api
    ports:
      - "3000:3000"
    volumes:
      - ./main-fe:/app
      - main_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"

volumes:
  pgdata:
  upload-data:
  m2:
  admin_node_modules:
  main_node_modules:
